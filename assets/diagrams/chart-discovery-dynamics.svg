<svg id="lg-disco" viewBox="0 0 860 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two conceptual panels over corpus consumed: the gap-discovery rate stays roughly constant then drops when the corpus is exhausted, leaving a residual; median gap depth declines steadily.">
  <style>
    #lg-disco text    { font-size: 12.5px; font-weight: 600; fill: var(--text, #1c2230); }
    #lg-disco .mono   { font-family: var(--font-mono, ui-monospace, SFMono-Regular, Menlo, monospace); font-weight: 400; }
    #lg-disco .note   { font-size: 11px; fill: var(--text-muted, #5b6472); }
    #lg-disco .axis   { stroke: var(--border, #e6e8ee); stroke-width: 1.3; fill: none; }
    #lg-disco .series { stroke: var(--dg-model, #5b4be0); stroke-width: 2; fill: none; stroke-linejoin: round; stroke-linecap: round; }
    #lg-disco .resid  { stroke: var(--dg-err, #b5259e); stroke-width: 2; fill: none; stroke-dasharray: 5 5; stroke-linecap: round; }
    #lg-disco .event  { stroke: var(--border, #e6e8ee); stroke-width: 1.2; stroke-dasharray: 3 4; }
  </style>

  <!-- Panel 1: discovery rate -->
  <text x="90" y="32">New gaps per unit of corpus</text>
  <line class="axis" x1="90" y1="210" x2="800" y2="210"/>
  <path class="series" d="M90,110 L120,98 L150,115 L180,104 L210,118 L240,100 L270,112 L300,95 L330,116 L360,102 L390,114 L420,99 L450,110 L480,97 L510,113 L540,101 L570,109 L600,96 L630,108 C 660,118 692,172 716,196"/>
  <path class="resid" d="M722,196 L800,192"/>
  <line class="event" x1="720" y1="58" x2="720" y2="210"/>
  <text class="mono note" x="300" y="74" text-anchor="middle">constant rate — sampling, not draining</text>
  <text class="mono note" x="712" y="50" text-anchor="end">corpus exhausted</text>
  <text class="mono note" x="726" y="182" text-anchor="start">residual gaps</text>

  <!-- Panel 2: gap depth -->
  <text x="90" y="266">Median depth of newly found gaps</text>
  <line class="axis" x1="90" y1="430" x2="800" y2="430"/>
  <path class="series" d="M90,300 C 200,332 320,372 450,392 C 560,406 660,412 800,414"/>
  <text class="mono note" x="102" y="292" text-anchor="start">whole subsystems missing</text>
  <text class="mono note" x="640" y="396" text-anchor="middle">ordinary bugs</text>

  <text class="mono note" x="445" y="458" text-anchor="middle">corpus consumed →</text>
</svg>
